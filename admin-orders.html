<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedidos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
padding:30px;
color:#222;
}

.container{
max-width:1300px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
background:#111;
color:#fff;
padding:10px 16px;
border-radius:10px;
font-size:14px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.numero{
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.info{
margin-bottom:8px;
color:#555;
}

.total{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:13px;
font-weight:bold;
margin-top:12px;
color:#fff;
}

.pendente{
background:#d97706;
}

.pago{
background:#059669;
}

.cancelado{
background:#dc2626;
}

.enviado{
background:#2563eb;
}

.default{
background:#111;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#111;
color:#fff;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.itens{
margin-top:18px;
padding-top:18px;
border-top:1px solid #eee;
}

.item{
display:flex;
gap:12px;
align-items:center;
margin-bottom:12px;
}

.item img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
background:#eee;
}

.vazio{
background:#fff;
padding:40px;
border-radius:16px;
text-align:center;
font-size:20px;
}

.msg{
position:fixed;
top:20px;
right:20px;
background:#111;
color:#fff;
padding:12px 16px;
border-radius:10px;
display:none;
z-index:999;
}

</style>
</head>
<body>

<div class="msg" id="msg"></div>

<div class="container">

<div class="topo">

<h1>Pedidos</h1>

<div class="menu">
<a href="/admin.html">Admin</a>
<a href="/admin-rentals.html">Aluguéis</a>
<a href="/">Loja</a>
<a href="/logout">Sair</a>
</div>

</div>

<div id="lista"></div>

</div>

<script>

async function iniciar(){

await verificarAdmin();

await carregarPedidos();

}

async function verificarAdmin(){

try{

const res = await fetch("/me");

const user = await res.json();

if(!user || user.role !== "admin"){

location.href="/login.html";

}

}catch(e){

location.href="/login.html";

}

}

async function carregarPedidos(){

try{

const res = await fetch("/admin/orders");

const pedidos = await res.json();

const box = document.getElementById("lista");

if(!Array.isArray(pedidos) || !pedidos.length){

box.innerHTML = `
<div class="vazio">
Nenhum pedido encontrado
</div>
`;

return;

}

let html = `<div class="grid">`;

for(const p of pedidos){

html += `
<div class="card">

<div class="numero">
Pedido #${p.id}
</div>

<div class="info">
<strong>Cliente:</strong>
${p.name || "-"}
</div>

<div class="info">
<strong>Data:</strong>
${formatarDataHora(p.created_at)}
</div>

<div class="total">
R$ ${Number(p.total || 0).toFixed(2)}
</div>

<div class="status ${classeStatus(p.status)}">
${p.status}
</div>

<select id="status_${p.id}">
<option value="Pendente">Pendente</option>
<option value="Pago">Pago</option>
<option value="Enviado">Enviado</option>
<option value="Concluído">Concluído</option>
<option value="Cancelado">Cancelado</option>
</select>

<button onclick="salvar(${p.id})">
Atualizar Status
</button>

<div class="itens" id="itens_${p.id}">
Carregando itens...
</div>

</div>
`;

}

html += `</div>`;

box.innerHTML = html;

for(const p of pedidos){

document.getElementById(
"status_"+p.id
).value = p.status;

carregarItens(p.id);

}

}catch(e){

mostrar("Erro ao carregar pedidos");

console.error(e);

}

}

async function carregarItens(id){

try{

const res = await fetch(
"/admin/order-items/" + id
);

const itens = await res.json();

const box = document.getElementById(
"itens_" + id
);

if(!Array.isArray(itens) || !itens.length){

box.innerHTML = "Nenhum item";

return;

}

let html = "";

itens.forEach(item=>{

html += `
<div class="item">

<img src="${
item.image_url || '/uploads/default.png'
}">

<div>

<div>
<strong>
${item.product_name}
</strong>
</div>

<div>
${item.action_type === "rent"
? "Aluguel"
: "Compra"}
</div>

<div>
Qtd: ${item.quantity}
</div>

<div>
R$ ${Number(item.price).toFixed(2)}
</div>

</div>

</div>
`;

});

box.innerHTML = html;

}catch(e){

console.error(e);

document.getElementById(
"itens_" + id
).innerHTML = "Erro ao carregar itens";

}

}

async function salvar(id){

try{

const status = document.getElementById(
"status_" + id
).value;

const req = await fetch(
"/admin/orders/" + id + "/status",
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({status})
}
);

const res = await req.json();

mostrar(res.message || "Atualizado");

carregarPedidos();

}catch(e){

mostrar("Erro ao atualizar");

}

}

function classeStatus(s){

s = (s || "").toLowerCase();

if(s.includes("pend")) return "pendente";

if(s.includes("pago")) return "pago";

if(s.includes("cancel")) return "cancelado";

if(s.includes("env")) return "enviado";

return "default";

}

function formatarDataHora(data){

if(!data) return "-";

const d = new Date(data);

return d.toLocaleDateString("pt-BR")
+ " "
+ d.toLocaleTimeString("pt-BR");

}

function mostrar(texto){

const msg = document.getElementById("msg");

msg.innerText = texto;

msg.style.display = "block";

setTimeout(()=>{

msg.style.display = "none";

},2500);

}

iniciar();

</script>

</body>
</html>
