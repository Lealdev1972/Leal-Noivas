<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agenda de Aluguéis</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
padding:30px;
color:#222;
}

.container{
max-width:1400px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

h1{
font-size:32px;
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
background:#111;
color:#fff;
padding:10px 16px;
border-radius:8px;
font-size:14px;
}

.painel{
display:grid;
grid-template-columns:340px 1fr;
gap:20px;
}

.card{
background:#fff;
border-radius:16px;
padding:22px;
box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.card h2{
font-size:20px;
margin-bottom:18px;
}

.lista{
display:flex;
flex-direction:column;
gap:12px;
}

.item{
padding:14px;
border:1px solid #eee;
border-radius:12px;
}

.item strong{
display:block;
font-size:15px;
margin-bottom:6px;
}

.item span{
display:block;
font-size:13px;
color:#666;
margin-bottom:4px;
}

.badge{
display:inline-block;
margin-top:8px;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
color:#fff;
background:#111;
}

.reservado{background:#f39c12;}
.retirado{background:#1565c0;}
.devolvido{background:#0f9d58;}
.atrasado{background:#c62828;}

.cal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
gap:10px;
}

.cal-header button{
border:none;
background:#111;
color:#fff;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.cal-title{
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day-name{
text-align:center;
font-size:13px;
font-weight:bold;
padding:8px 0;
color:#666;
}

.day{
background:#fafafa;
border:1px solid #eee;
border-radius:12px;
min-height:120px;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.day.empty{
background:transparent;
border:none;
}

.num{
font-size:14px;
font-weight:bold;
}

.event{
font-size:11px;
padding:6px;
border-radius:8px;
color:#fff;
line-height:1.3;
}

.event.reservado{background:#f39c12;}
.event.retirado{background:#1565c0;}
.event.devolvido{background:#0f9d58;}
.event.atrasado{background:#c62828;}

select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:10px;
}

button.full{
width:100%;
margin-top:10px;
padding:11px;
border:none;
background:#111;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.msg{
position:fixed;
top:20px;
right:20px;
background:#111;
color:#fff;
padding:12px 16px;
border-radius:10px;
display:none;
z-index:999;
}

@media(max-width:1000px){

.painel{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:700px){

body{
padding:15px;
}

h1{
font-size:26px;
}

.grid{
grid-template-columns:1fr;
}

}
</style>
</head>
<body>

<div class="msg" id="msg"></div>

<div class="container">

<div class="topo">

<h1>Agenda de Aluguéis</h1>

<div class="menu">
<a href="/admin.html">Produtos</a>
<a href="/admin-orders.html">Pedidos</a>
<a href="/">Loja</a>
<a href="/logout">Sair</a>
</div>

</div>

<div class="painel">

<div class="card">

<h2>Reservas</h2>

<div class="lista" id="lista">
Carregando...
</div>

</div>

<div class="card">

<div class="cal-header">
<button onclick="mesAnterior()">◀</button>
<div class="cal-title" id="titulo"></div>
<button onclick="proximoMes()">▶</button>
</div>

<div class="grid" id="calendario"></div>

</div>

</div>

</div>

<script>

let rentals = [];
let hoje = new Date();
let mes = hoje.getMonth();
let ano = hoje.getFullYear();

async function iniciar(){
await verificarAdmin();
await carregar();
renderizar();
}

async function verificarAdmin(){

const res = await fetch("/me");
const user = await res.json();

if(!user || user.role !== "admin"){
location.href="/";
}

}

async function carregar(){

const res = await fetch("/admin/rentals");
rentals = await res.json();

renderLista();

}

function renderLista(){

const box = document.getElementById("lista");

if(!Array.isArray(rentals) || rentals.length===0){
box.innerHTML = "Nenhum aluguel.";
return;
}

let html = "";

rentals.forEach(r=>{

html += `
<div class="item">

<strong>${r.product_name}</strong>

<span>Cliente: ${r.client_name}</span>
<span>Retirada: ${formatar(r.start_date)}</span>
<span>Devolução: ${formatar(r.end_date)}</span>

<div class="badge ${classe(r)}">
${statusTexto(r)}
</div>

<select id="s_${r.id}">
<option value="Reservado">Reservado</option>
<option value="Retirado">Retirado</option>
<option value="Devolvido">Devolvido</option>
<option value="Cancelado">Cancelado</option>
</select>

<button class="full" onclick="salvar(${r.id})">
Atualizar
</button>

</div>
`;

});

box.innerHTML = html;

rentals.forEach(r=>{
document.getElementById("s_"+r.id).value = r.status;
});

}

async function salvar(id){

const status =
document.getElementById("s_"+id).value;

const res = await fetch("/admin/rental/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({status})
});

const data = await res.json();

mostrar(data.message || "Atualizado");

await carregar();
renderizar();

}

function renderizar(){

const nomes = [
"Janeiro","Fevereiro","Março","Abril",
"Maio","Junho","Julho","Agosto",
"Setembro","Outubro","Novembro","Dezembro"
];

document.getElementById("titulo").innerText =
nomes[mes]+" "+ano;

const cal = document.getElementById("calendario");

let html = `
<div class="day-name">Dom</div>
<div class="day-name">Seg</div>
<div class="day-name">Ter</div>
<div class="day-name">Qua</div>
<div class="day-name">Qui</div>
<div class="day-name">Sex</div>
<div class="day-name">Sáb</div>
`;

const primeiro = new Date(ano,mes,1).getDay();
const totalDias = new Date(ano,mes+1,0).getDate();

for(let i=0;i<primeiro;i++){
html += `<div class="day empty"></div>`;
}

for(let dia=1; dia<=totalDias; dia++){

html += `<div class="day">
<div class="num">${dia}</div>`;

rentals.forEach(r=>{

const ini = new Date(r.start_date);
const fim = new Date(r.end_date);
const atual = new Date(ano,mes,dia);

if(atual >= zerar(ini) && atual <= zerar(fim)){

html += `
<div class="event ${classe(r)}">
${r.product_name}
</div>
`;

}

});

html += `</div>`;

}

cal.innerHTML = html;

}

function zerar(d){
return new Date(
d.getFullYear(),
d.getMonth(),
d.getDate()
);
}

function mesAnterior(){

mes--;

if(mes < 0){
mes = 11;
ano--;
}

renderizar();

}

function proximoMes(){

mes++;

if(mes > 11){
mes = 0;
ano++;
}

renderizar();

}

function classe(r){

if(r.status === "Devolvido") return "devolvido";
if(r.status === "Retirado") return "retirado";
if(r.status === "Cancelado") return "devolvido";

const hoje = new Date();
const fim = new Date(r.end_date);

if(fim < zerar(hoje) && r.status !== "Devolvido"){
return "atrasado";
}

return "reservado";

}

function statusTexto(r){

if(classe(r)==="atrasado") return "Atrasado";
return r.status;

}

function formatar(data){

const d = new Date(data);

return d.toLocaleDateString("pt-BR");

}

function mostrar(txt){

const msg = document.getElementById("msg");

msg.innerText = txt;
msg.style.display = "block";

setTimeout(()=>{
msg.style.display="none";
},2500);

}

iniciar();

</script>

</body>
</html>
